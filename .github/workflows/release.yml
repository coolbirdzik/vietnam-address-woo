name: Build and Release Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.0.0)"
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Get version from tag or input
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Update plugin version
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          sed -i "s/\* Version:.*/\* Version: $VERSION/" vietnam-address-woocommerce.php
          sed -i "s/Stable tag:.*/Stable tag: $VERSION/" readme.txt

      - name: Build plugin
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Generate release notes
        id: release-notes
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges | head -20)
          fi

          {
            echo "## Changes in v${VERSION}"
            echo ""
            echo "### Commits"
            echo "$COMMITS"
            echo ""
            echo "### Installation"
            echo "1. Download the zip file"
            echo "2. Go to WordPress Admin → Plugins → Add New → Upload Plugin"
            echo "3. Upload and activate"
            echo ""
            echo "### Requirements"
            echo "- WordPress: 5.0+"
            echo "- WooCommerce: 8.0+"
            echo "- PHP: 7.4+"
          } > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          name: v${{ steps.get_version.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: dist/vietnam-address-woocommerce-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
